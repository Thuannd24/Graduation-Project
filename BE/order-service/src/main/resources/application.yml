server:
  port: 8082

spring:
  application:
    name: order-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: "jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3308}/${DB_NAME:ecommerce_order_db}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8"
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MariaDBDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: order-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8083/realms/ecommerce-realm}

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  internal:
    api-key: ${INTERNAL_API_KEY:dev-internal-api-key}
  shipping:
    webhook-secret: ${SHIPPING_WEBHOOK_SECRET:dev-shipping-webhook-secret}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.netflix.discovery: WARN
    com.netflix.eureka: WARN

grpc:
  client:
    inventory-service:
      address: "discovery:///inventory-service"
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-without-calls: true
    product-service:
      address: "discovery:///product-service"
      negotiation-type: plaintext
      enable-keep-alive: true
      keep-alive-without-calls: true
