server:
  port: 8086

spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:notif_db}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    listener:
      ack-mode: manual_immediate
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:thuan2412004@gmail.com}
    password: ${MAIL_PASSWORD:dslr tvmj kgjq naeq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

minio:
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  bucket-name: ${MINIO_BUCKET_NAME:product-images}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  brand:
    name: AuraTech
    tagline: Công nghệ chính hãng · Giao nhanh toàn quốc
    support-email: hotro@auratech.vn
    logo-object: site/auratech-logo.png
    logo-url: ${BRAND_LOGO_URL:}
